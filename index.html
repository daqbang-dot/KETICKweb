<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>KETICK · Terminal Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 30% 10%, #2c2e3a, #14151c);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'SF Mono', 'Menlo', 'Monaco', 'Cascadia Code', 'Fira Code', monospace;
            padding: 2rem;
        }

        .terminal {
            max-width: 1300px;
            width: 100%;
            background: rgba(28, 30, 36, 0.92);
            backdrop-filter: blur(14px);
            border-radius: 1.2rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.08);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        .terminal-header {
            background: rgba(38, 40, 46, 0.9);
            padding: 0.7rem 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .win-dots {
            display: flex;
            gap: 0.55rem;
            margin-right: 0.5rem;
        }
        .dot {
            width: 13px;
            height: 13px;
            border-radius: 50%;
            box-shadow: inset 0 0 2px rgba(0,0,0,0.2);
        }
        .dot.red { background: #ff5f57; border: 1px solid #e0443c; }
        .dot.yellow { background: #ffbd2e; border: 1px solid #e09f1a; }
        .dot.green { background: #28c840; border: 1px solid #1a9e2e; }

        .terminal-title {
            color: #e2e4e8;
            font-size: 0.8rem;
            font-weight: 500;
            background: rgba(55, 58, 66, 0.7);
            padding: 0.2rem 0.9rem;
            border-radius: 20px;
            font-family: 'SF Mono', monospace;
            backdrop-filter: blur(4px);
        }
        .terminal-title i {
            font-style: normal;
            color: #5fcb5c;
        }

        .terminal-output {
            background: #1c1e24;
            padding: 1.4rem 1.4rem;
            min-height: 480px;
            max-height: 62vh;
            overflow-y: auto;
            font-size: 0.92rem;
            line-height: 1.5;
            color: #dddfe6;
            scroll-behavior: smooth;
        }
        .terminal-output::-webkit-scrollbar {
            width: 8px;
            background: #2a2c33;
        }
        .terminal-output::-webkit-scrollbar-thumb {
            background: #5c5f6b;
            border-radius: 10px;
        }

        .cmd-line {
            display: flex;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 0.5rem;
            background: #1c1e24;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            padding: 0.8rem 1.4rem;
        }
        .prompt {
            color: #5fcb5c;
            font-weight: 500;
            font-size: 0.95rem;
            white-space: nowrap;
            font-family: monospace;
        }
        .prompt .path {
            color: #8d96b0;
        }
        .input-field {
            flex: 1;
            background: transparent;
            border: none;
            color: #f0f3fc;
            font-family: 'SF Mono', 'Menlo', monospace;
            font-size: 0.95rem;
            outline: none;
            caret-color: #5fcb5c;
            padding: 0.2rem 0;
        }
        .input-field::placeholder {
            color: #5a5e72;
            font-size: 0.85rem;
        }

        .terminal-footer {
            background: rgba(26, 28, 34, 0.9);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding: 0.55rem 1.4rem;
            font-size: 0.7rem;
            color: #858aa8;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
        }

        .output-block {
            margin: 0.2rem 0 0.5rem 0;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .command-history {
            margin-top: 0.3rem;
            color: #cbd5e6;
            opacity: 0.85;
            font-size: 0.9rem;
        }
        .command-history span:first-child {
            color: #5fcb5c;
        }
        .error-msg {
            color: #ff8a7a;
            border-left: 3px solid #ff6b5b;
            padding-left: 0.75rem;
            background: rgba(255, 80, 70, 0.08);
            border-radius: 8px;
        }
        .success-msg {
            color: #a3f0a0;
            border-left: 3px solid #5fcb5c;
            padding-left: 0.75rem;
            background: rgba(95, 203, 92, 0.08);
            border-radius: 8px;
        }
        .product-table {
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 0.6rem 1.2rem;
            margin-top: 0.6rem;
            background: rgba(38, 40, 48, 0.7);
            padding: 0.8rem;
            border-radius: 14px;
            border: 1px solid rgba(95, 203, 92, 0.2);
        }
        .prod-name { font-weight: 600; color: #e6ffdb; }
        .prod-desc { color: #bcc4dc; }
        .prod-price { color: #ffdfa5; }
        hr { border-color: rgba(95, 203, 92, 0.3); margin: 0.6rem 0; }
        a { color: #90f07c; text-decoration: none; border-bottom: 1px dashed #6ea65e; }
        a:hover { color: #c2ffae; }
        @media (max-width: 680px) {
            body { padding: 1rem; }
            .terminal-output { padding: 1rem; font-size: 0.85rem; }
            .product-table { grid-template-columns: 1fr; gap: 0.4rem; }
            .prompt { font-size: 0.85rem; }
        }
    </style>
</head>
<body>

<div class="terminal">
    <div class="terminal-header">
        <div class="win-dots">
            <div class="dot red"></div>
            <div class="dot yellow"></div>
            <div class="dot green"></div>
        </div>
        <div class="terminal-title">
            <i>❯❯ KETICK :: Terminal v2.0</i>
        </div>
    </div>

    <div class="terminal-output" id="terminalOutput"></div>

    <div class="cmd-line" id="cmdForm">
        <div class="prompt">
            <span>➜</span> <span class="path">ketick@MacBook</span> <span style="color:#dddfe6;">~</span> %
        </div>
        <input type="text" class="input-field" id="terminalInput" autofocus placeholder="taip 'help' untuk arahan..." spellcheck="false">
    </div>

    <div class="terminal-footer">
        <span>⚡ KETICK · build & sell systems | coding house</span>
        <span>⌨️  zsh‑like · v1.0</span>
    </div>
</div>

<script>
    (function() {
        // ----- DATA PRODUK -----
        const products = [
            { id: "tickpos", name: "TickPOS Pro", desc: "Sistem Point-of-Sale lengkap dengan inventori, laporan masa nyata.", price: "RM 1,999" },
            { id: "tickcrm", name: "KETICK CRM", desc: "Pengurusan pelanggan, automasi follow-up & analisis jualan.", price: "RM 1,499" },
            { id: "tickanalytics", name: "TickAnalytics", desc: "Dashboard business intelligence + AI forecasting.", price: "RM 999" },
            { id: "tickcloud", name: "KETICK Cloud Suite", desc: "Infrastruktur pengurusan cloud untuk SME.", price: "RM 2,999" },
            { id: "tickschool", name: "TickEdu System", desc: "Sistem pengurusan sekolah & pembelajaran digital.", price: "RM 2,499" },
            { id: "tickcustom", name: "Custom Dev", desc: "Pembangunan sistem tempahan khas (ERP, web app, automasi).", price: "Hubungi untuk sebut harga" }
        ];

        let commandHistory = [];
        let historyIndex = -1;

        const outputDiv = document.getElementById("terminalOutput");
        const inputEl = document.getElementById("terminalInput");
        const cmdForm = document.getElementById("cmdForm");

        if (!outputDiv || !inputEl || !cmdForm) {
            console.error("Terminal elements missing!");
            return;
        }

        // Helper functions
        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function appendToTerminal(content, type = "normal") {
            const msgDiv = document.createElement("div");
            msgDiv.classList.add("output-block");
            if (type === "error") msgDiv.classList.add("error-msg");
            else if (type === "success") msgDiv.classList.add("success-msg");
            if (typeof content === "string") msgDiv.innerHTML = content;
            else msgDiv.appendChild(content);
            outputDiv.appendChild(msgDiv);
            outputDiv.scrollTop = outputDiv.scrollHeight;
        }

        function appendCommand(cmdText) {
            const cmdDiv = document.createElement("div");
            cmdDiv.classList.add("command-history");
            cmdDiv.innerHTML = `<span>➜ ketick@MacBook ~ %</span> <span style="color:#f0f3fc;">${escapeHtml(cmdText)}</span>`;
            outputDiv.appendChild(cmdDiv);
            outputDiv.scrollTop = outputDiv.scrollHeight;
        }

        function showProducts() {
            const container = document.createElement("div");
            container.innerHTML = `<strong>📦  KATALOG SISTEM KETICK  📦</strong>`;
            const grid = document.createElement("div");
            grid.className = "product-table";
            // headers
            grid.innerHTML = `
                <div style="font-weight:600;color:#bbff99;">SYSTEM</div>
                <div style="font-weight:600;">DESCRIPTION</div>
                <div style="font-weight:600;">PRICE</div>
            `;
            products.forEach(p => {
                grid.innerHTML += `
                    <div style="color:#f0ffd6;font-weight:500;">${escapeHtml(p.name)}</div>
                    <div style="color:#cbd5f0;">${escapeHtml(p.desc)}</div>
                    <div style="color:#ffe2a4;">${escapeHtml(p.price)}</div>
                `;
            });
            container.appendChild(grid);
            const footer = document.createElement("div");
            footer.innerHTML = `<hr>✨ Beli sistem: <code style="background:#2f323c;padding:2px 8px;border-radius:20px;">buy [nama_produk]</code> — contoh: buy tickpos`;
            footer.style.marginTop = "0.8rem";
            footer.style.fontSize = "0.85rem";
            container.appendChild(footer);
            appendToTerminal(container);
        }

        function showAbout() {
            appendToTerminal(`
                <div style="background:rgba(40,44,55,0.6);padding:0.8rem;border-radius:16px;border-left:4px solid #5fcb5c;">
                <strong style="color:#d0ffbe;">⎯ KETICK — coding studio ⎯</strong><br>
                KETICK ialah rumah pembangunan sistem (coding house) yang membina perisian tersuai & menjual sistem berskala enterprise. 
                Dari sistem retail, CRM, automasi korporat — kami gabungkan kecekapan kod dengan reka bentuk futuristik. <br>
                📍 Setiap sistem dibangunkan dengan teknologi moden (React, Laravel, Python) & sokongan sepenuh masa.<br>
                🌐 <strong>Misi:</strong> Memperkasakan perniagaan melalui terminal & software yang mantap.
                </div>
            `);
        }

        function showContact() {
            appendToTerminal(`
                <div class="success-msg" style="padding:0.5rem 0;">
                📧 E-mel: <a href="mailto:sales@ketick.com">sales@ketick.com</a><br>
                📞 Hotline: +60 12-345 6789 (WhatsApp Business)<br>
                🌐 Portal: <a href="#">https://ketick.tech</a><br>
                🐙 GitHub: @keticklabs &nbsp;| 🕊️ Twitter: @ketick_io<br>
                💬 Untuk sebarang pertanyaan sistem atau tempahan coding, hubungi kami.
                </div>
            `);
        }

        function showCustomDev() {
            appendToTerminal(`
                <div style="border:1px solid #5fcb5c55;border-radius:18px;padding:0.8rem;background:rgba(30,35,45,0.7);">
                <span style="color:#e2ffbc;">⚙️ PERKHIDMATAN BUILD-TO-ORDER ⚙️</span><br>
                KETICK membina sistem 100% tersuai mengikut keperluan perniagaan anda:<br>
                • Sistem ERP / HRMS / Inventory lanjutan<br>
                • Aplikasi web & mobile + API integration<br>
                • Automasi aliran kerja & AI analytics<br>
                <strong>🔥 Mulakan projek: hubungi kami dengan command 'contact' atau e-mel terus.</strong><br>
                Harga bermula dari RM 4,500 (bergantung skop).
                </div>
            `);
        }

        function processBuy(args) {
            if (!args || args.trim() === "") {
                appendToTerminal("⚠️ Usage: buy [product_id] — contoh: buy tickpos , buy tickcrm", "error");
                return;
            }
            const target = args.trim().toLowerCase();
            const product = products.find(p => p.id === target || p.name.toLowerCase() === target);
            if (!product) {
                appendToTerminal(`❌ Produk "${args}" tidak ditemui. Taip 'products' untuk senarai sistem.`, "error");
                return;
            }
            appendToTerminal(`
                <div style="background:rgba(30,48,30,0.5);border-radius:20px;padding:0.7rem 1rem;border:1px solid #5fcb5c55;">
                🧾 <strong style="color:#e9ffb4;">ORDER INITIATED</strong> — ${product.name}<br>
                💰 Harga: ${product.price}<br>
                📦 Penerangan: ${product.desc}<br>
                ✅ Langkah seterusnya: Sila e-mel <strong>sales@ketick.com</strong> dengan subjek "PURCHASE: ${product.id}" dan nyatakan butiran syarikat.<br>
                🔗 Kami akan hantar invois & pautan pembayaran dalam masa 24 jam.<br>
                ⚡ Sistem akan dihantar secara digital + pakej pemasangan.
                </div>
            `, "success");
        }

        function showHelp() {
            appendToTerminal(`
                <div style="background:rgba(35,38,48,0.7);border-radius:18px;padding:0.7rem 1rem;">
                <strong>🖥️  KETICK TERMINAL HELP  —  arahan tersedia</strong><br>
                <table style="width:100%;border-spacing:0 8px;margin-top:0.5rem;">
                    <tr><td style="color:#b2ff8f;">help</td><td style="color:#bdc3db;">→ Papar senarai command ini.</td></tr>
                    <tr><td style="color:#b2ff8f;">products / list</td><td style="color:#bdc3db;">→ Senarai sistem yang dijual.</td></tr>
                    <tr><td style="color:#b2ff8f;">buy [id/nama]</td><td style="color:#bdc3db;">→ Beli sistem. Contoh: buy tickpos</td></tr>
                    <tr><td style="color:#b2ff8f;">about</td><td style="color:#bdc3db;">→ Maklumat syarikat KETICK.</td></tr>
                    <tr><td style="color:#b2ff8f;">contact</td><td style="color:#bdc3db;">→ Hubungi pasukan jualan.</td></tr>
                    <tr><td style="color:#b2ff8f;">custom / dev</td><td style="color:#bdc3db;">→ Perkhidmatan pembangunan sistem tempahan.</td></tr>
                    <tr><td style="color:#b2ff8f;">clear</td><td style="color:#bdc3db;">→ Bersihkan skrin terminal.</td></tr>
                </table>
                <hr style="border-color:#3a4050;">
                <i>💡 Petua: KETICK juga membina sistem dari awal (coding) — command 'custom' untuk maklumat lanjut.</i>
                </div>
            `);
        }

        function clearTerminal() {
            while (outputDiv.firstChild) outputDiv.removeChild(outputDiv.firstChild);
            const clean = document.createElement("div");
            clean.className = "output-block";
            clean.innerHTML = `<span style="color:#7dcc78;">✦ terminal cleared ✦   ketick@system ready.</span><br>`;
            outputDiv.appendChild(clean);
        }

        function handleCommand(rawCmd) {
            const cmd = rawCmd.trim().toLowerCase();
            if (cmd === "") return;

            const parts = rawCmd.trim().split(/\s+/);
            const mainCmd = parts[0].toLowerCase();
            const args = parts.slice(1).join(" ");

            switch (mainCmd) {
                case "help": showHelp(); break;
                case "products": case "list": showProducts(); break;
                case "buy": processBuy(args); break;
                case "about": showAbout(); break;
                case "contact": showContact(); break;
                case "custom": case "dev": showCustomDev(); break;
                case "clear": clearTerminal(); break;
                default:
                    appendToTerminal(`Command tidak dikenali: "${escapeHtml(rawCmd)}". Taip 'help' untuk senarai arahan.`, "error");
            }
        }

        function onCommandSubmit(e) {
            e.preventDefault();
            const cmdText = inputEl.value;
            if (cmdText === "") {
                inputEl.focus();
                return;
            }
            commandHistory.push(cmdText);
            historyIndex = commandHistory.length;
            appendCommand(cmdText);
            handleCommand(cmdText);
            inputEl.value = "";
            inputEl.focus();
        }

        function handleHistoryKey(e) {
            if (e.key === "ArrowUp") {
                e.preventDefault();
                if (commandHistory.length === 0) return;
                if (historyIndex > 0) historyIndex--;
                else if (historyIndex === 0) { /* stay */ }
                else historyIndex = commandHistory.length - 1;
                inputEl.value = (historyIndex >= 0 && historyIndex < commandHistory.length) ? commandHistory[historyIndex] : "";
            } else if (e.key === "ArrowDown") {
                e.preventDefault();
                if (commandHistory.length === 0) return;
                if (historyIndex < commandHistory.length - 1) {
                    historyIndex++;
                    inputEl.value = commandHistory[historyIndex];
                } else {
                    historyIndex = commandHistory.length;
                    inputEl.value = "";
                }
            }
        }

        function initWelcome() {
            const ascii = `
        ╔════════════════════════════════════════════════════════╗
        ║   ██╗  ██╗███████╗████████╗██╗ ██████╗██╗  ██╗        ║
        ║   ██║ ██╔╝██╔════╝╚══██╔══╝██║██╔════╝██║ ██╔╝        ║
        ║   █████╔╝ █████╗     ██║   ██║██║     █████╔╝         ║
        ║   ██╔═██╗ ██╔══╝     ██║   ██║██║     ██╔═██╗         ║
        ║   ██║  ██╗███████╗   ██║   ██║╚██████╗██║  ██╗        ║
        ║   ╚═╝  ╚═╝╚══════╝   ╚═╝   ╚═╝ ╚═════╝╚═╝  ╚═╝        ║
        ╚════════════════════════════════════════════════════════╝
            `;
            const welcomeDiv = document.createElement("div");
            welcomeDiv.className = "output-block";
            welcomeDiv.style.whiteSpace = "pre";
            welcomeDiv.style.fontSize = "0.7rem";
            welcomeDiv.style.lineHeight = "1.2";
            welcomeDiv.style.color = "#9bdb86";
            welcomeDiv.innerHTML = ascii;
            outputDiv.appendChild(welcomeDiv);
            
            appendToTerminal(`
                <div style="border-left: 4px solid #5fcb5c; padding-left: 14px; margin: 12px 0 8px;">
                ✨ <strong>KETICK TERMINAL PLATFORM</strong> ✨<br>
                • Kami membina & menjual sistem perniagaan moden.<br>
                • Gunakan command <span style="background:#2a2e3a; padding:0 6px; border-radius:12px;">help</span> untuk terokai produk, harga, dan perkhidmatan coding.<br>
                • Sistem boleh dibeli terus melalui terminal ini — <strong>taip 'products'</strong> untuk melihat katalog.<br>
                🧬 <em>"Code. Deploy. Dominate."</em>
                </div>
            `);
            appendToTerminal(`💻 ➜ Taip arahan di bawah. Contoh: products , buy tickpos , about`);
        }

        cmdForm.addEventListener("submit", onCommandSubmit);
        inputEl.addEventListener("keydown", handleHistoryKey);
        inputEl.addEventListener("click", () => inputEl.focus());
        document.body.addEventListener("click", () => inputEl.focus());
        initWelcome();
    })();
</script>
</body>
</html>
